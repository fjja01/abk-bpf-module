# ABK 自定义外部模块配置文件
# 用于在 GKI 内核构建时追加 eBPF 增强配置
# 适配设备：Xiaomi Redmi K70 Pro (vermeer) / SM8650 / android13-5.15

ABK_MODULE_NAME=abk-bpf-enhanced
ABK_MODULE_ID=abk-bpf-enhanced
ABK_MODULE_VERSION=1.0.0
ABK_MODULE_DESCRIPTION=为 GKI 5.15 内核追加 eBPF 增强配置：BPF_LSM / FUNCTION_TRACER / FTRACE_SYSCALLS / SECURITY_BPF / DYNAMIC_FTRACE / FUNCTION_ERROR_INJECTION / BPF_EVENTS / BPF_STREAM_PARSER / DEBUG_INFO_BTF 等
ABK_MODULE_KIND=module
ABK_MODULE_SUPPORTED_STAGES=after_patch,before_build
ABK_MODULE_DEFAULT_STAGE=after_patch
ABK_MODULE_RECOMMENDED_STAGES=after_patch
ABK_MODULE_AUTHOR=fjja01
ABK_MODULE_HOMEPAGE=https://github.com/fjja01/abk-bpf-module
